name: Redmi K60 Kernel Builder

on:
  workflow_dispatch:
    inputs:
      build_target:
        description: "What do you want to build?"
        required: true
        default: "all"
        type: choice
        options:
          - kernel
          - modules
          - dts
          - all

env:
  ARCH: arm64
  DEFCONFIG: defconfig
  FRAGMENT_CONFIG: sm8450.config
  DTS_FILE: sm8475-redmi-k60.dts

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y \
            bc bison flex build-essential \
            clang lld llvm \
            gcc-aarch64-linux-gnu \
            libc6-dev-arm64-cross \
            libssl-dev libelf-dev \
            dwarves cpio rsync zip

      - name: Prepare config
        run: |
          mkdir -p out

          make O=out defconfig

          if [ -f sm8450.config ]; then
            ./scripts/kconfig/merge_config.sh \
              -m \
              -O out \
              out/.config \
              sm8450.config
          fi

          make O=out olddefconfig

      - name: Build Image
        if: github.event.inputs.build_target == 'kernel' || github.event.inputs.build_target == 'all'
        run: |
          make -j$(nproc) \
            O=out \
            ARCH=arm64 \
            CC=clang \
            LLVM=1 \
            Image

      - name: Zip Image
        if: github.event.inputs.build_target == 'kernel' || github.event.inputs.build_target == 'all'
        run: |
          mkdir kernel
          cp out/arch/arm64/boot/Image kernel/
          cd kernel
          zip -r ../kernel.zip .

      - name: Upload Image
        if: github.event.inputs.build_target == 'kernel' || github.event.inputs.build_target == 'all'
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-Image
          path: kernel.zip

      - name: Build Modules
        if: github.event.inputs.build_target == 'modules' || github.event.inputs.build_target == 'all'
        run: |
          make -j$(nproc) \
            O=out \
            ARCH=arm64 \
            CC=clang \
            LLVM=1 \
            modules

      - name: Install Modules
        if: github.event.inputs.build_target == 'modules' || github.event.inputs.build_target == 'all'
        run: |
          mkdir modules_install

          make O=out \
            ARCH=arm64 \
            INSTALL_MOD_PATH=$PWD/modules_install \
            modules_install

      - name: Zip Modules
        if: github.event.inputs.build_target == 'modules' || github.event.inputs.build_target == 'all'
        run: |
          cd modules_install
          zip -r ../modules.zip .

      - name: Upload Modules
        if: github.event.inputs.build_target == 'modules' || github.event.inputs.build_target == 'all'
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-Modules
          path: modules.zip

      - name: Build DTB
        if: github.event.inputs.build_target == 'dts' || github.event.inputs.build_target == 'all'
        run: |
          make -j$(nproc) \
            O=out \
            ARCH=arm64 \
            CC=clang \
            LLVM=1 \
            sm8475-redmi-k60.dtb

      - name: Zip DTB
        if: github.event.inputs.build_target == 'dts' || github.event.inputs.build_target == 'all'
        run: |
          mkdir dtb
          find out -name "*.dtb" -exec cp {} dtb/ \;
          find out -name "*.dtbo" -exec cp {} dtb/ \; || true
          cd dtb
          zip -r ../dtb.zip .

      - name: Upload DTB
        if: github.event.inputs.build_target == 'dts' || github.event.inputs.build_target == 'all'
        uses: actions/upload-artifact@v4
        with:
          name: DTB
          path: dtb.zip
