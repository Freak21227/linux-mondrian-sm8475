name: Redmi K60 Kernel Builder

on:
  workflow_dispatch:
    inputs:
      build_target:
        description: "What do you want to build?"
        required: true
        default: "all"
        type: choice
        options:
          - kernel
          - modules
          - dts
          - all

env:
  ARCH: arm64
  DEFCONFIG: defconfig              # arch/arm64/configs/defconfig
  FRAGMENT_CONFIG: sm8450.config    # optional fragment — skipped if not present
  DTS_FILE: sm8475-redmi-k60        # without extension

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      # ------------------------------------------------------------------ #
      #  Dependencies                                                        #
      # ------------------------------------------------------------------ #
      # With LLVM=1, clang handles arm64 cross-compilation natively via
      # --target=aarch64-linux-gnu. No GCC cross-compiler needed.
      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-${{ runner.os }}-kernel-v1

      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y \
            bc bison flex build-essential \
            clang lld llvm \
            libssl-dev libelf-dev \
            dwarves cpio rsync zip

      # ------------------------------------------------------------------ #
      #  Build cache                                                         #
      # ------------------------------------------------------------------ #
      - name: Cache build output
        uses: actions/cache@v4
        with:
          path: out
          key: >-
            kernel-out-${{ runner.os }}-
            ${{ hashFiles('Makefile', 'arch/arm64/configs/**', env.FRAGMENT_CONFIG) }}
          restore-keys: |
            kernel-out-${{ runner.os }}-

      # ------------------------------------------------------------------ #
      #  Config                                                              #
      # ------------------------------------------------------------------ #
      - name: Prepare config
        run: |
          mkdir -p out

          make O=out \
            ARCH=${{ env.ARCH }} \
            CC=clang \
            LLVM=1 \
            ${{ env.DEFCONFIG }}

          # Merge fragment if it exists
          if [ -f "${{ env.FRAGMENT_CONFIG }}" ]; then
            KCONFIG_CONFIG=out/.config \
              ./scripts/kconfig/merge_config.sh \
                -m \
                out/.config \
                ${{ env.FRAGMENT_CONFIG }}
          fi

          # Resolve any new symbols introduced by the fragment
          make O=out \
            ARCH=${{ env.ARCH }} \
            CC=clang \
            LLVM=1 \
            olddefconfig

          # Show a summary of what will be built
          echo "---"
          grep "^CONFIG_LOCALVERSION=" out/.config || true
          echo "Kernel version: $(make O=out kernelversion 2>/dev/null)"
          echo "---"

      # ------------------------------------------------------------------ #
      #  Kernel Image                                                        #
      # ------------------------------------------------------------------ #
      - name: Build Image
        if: >
          github.event.inputs.build_target == 'kernel' ||
          github.event.inputs.build_target == 'all'
        run: |
          make -j$(nproc) \
            O=out \
            ARCH=${{ env.ARCH }} \
            CC=clang \
            LLVM=1 \
            Image

      - name: Collect Image
        if: >
          github.event.inputs.build_target == 'kernel' ||
          github.event.inputs.build_target == 'all'
        run: |
          mkdir -p artifacts/kernel
          cp out/arch/arm64/boot/Image artifacts/kernel/
          zip -r kernel.zip artifacts/kernel/

      - name: Upload Image
        if: >
          github.event.inputs.build_target == 'kernel' ||
          github.event.inputs.build_target == 'all'
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-Image
          path: kernel.zip

      # ------------------------------------------------------------------ #
      #  Modules                                                             #
      # ------------------------------------------------------------------ #
      - name: Build Modules
        if: >
          github.event.inputs.build_target == 'modules' ||
          github.event.inputs.build_target == 'all'
        run: |
          make -j$(nproc) \
            O=out \
            ARCH=${{ env.ARCH }} \
            CC=clang \
            LLVM=1 \
            modules

      - name: Install Modules
        if: >
          github.event.inputs.build_target == 'modules' ||
          github.event.inputs.build_target == 'all'
        run: |
          mkdir -p artifacts/modules

          make O=out \
            ARCH=${{ env.ARCH }} \
            INSTALL_MOD_PATH=$PWD/artifacts/modules \
            INSTALL_MOD_STRIP=1 \
            modules_install

          # Remove broken build/source symlinks — they point to
          # the runner's local paths and are useless in the artifact
          find artifacts/modules -type l \
            \( -name 'build' -o -name 'source' \) -delete

      - name: Collect Modules
        if: >
          github.event.inputs.build_target == 'modules' ||
          github.event.inputs.build_target == 'all'
        run: |
          zip -r modules.zip artifacts/modules/

      - name: Upload Modules
        if: >
          github.event.inputs.build_target == 'modules' ||
          github.event.inputs.build_target == 'all'
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-Modules
          path: modules.zip

      # ------------------------------------------------------------------ #
      #  DTBs                                                                #
      # ------------------------------------------------------------------ #
      - name: Build DTBs
        if: >
          github.event.inputs.build_target == 'dts' ||
          github.event.inputs.build_target == 'all'
        run: |
          # 'dtbs' builds all device trees; we filter to the target below
          make -j$(nproc) \
            O=out \
            ARCH=${{ env.ARCH }} \
            CC=clang \
            LLVM=1 \
            dtbs

      - name: Collect DTBs
        if: >
          github.event.inputs.build_target == 'dts' ||
          github.event.inputs.build_target == 'all'
        run: |
          mkdir -p artifacts/dtb
          DTB_DIR=out/arch/arm64/boot/dts

          # Try device-specific files first
          find "$DTB_DIR" \
            \( -name "${{ env.DTS_FILE }}.dtb" \
            -o -name "${{ env.DTS_FILE }}.dtbo" \) \
            -exec cp {} artifacts/dtb/ \; 2>/dev/null || true

          # Fall back to everything if nothing matched
          if [ -z "$(ls -A artifacts/dtb)" ]; then
            echo "::warning::Device DTB not found — collecting all DTBs as fallback"
            find "$DTB_DIR" -name "*.dtb"  -exec cp {} artifacts/dtb/ \;
            find "$DTB_DIR" -name "*.dtbo" -exec cp {} artifacts/dtb/ \; || true
          fi

          echo "DTBs collected:"
          ls -lh artifacts/dtb/

          zip -r dtb.zip artifacts/dtb/

      - name: Upload DTBs
        if: >
          github.event.inputs.build_target == 'dts' ||
          github.event.inputs.build_target == 'all'
        uses: actions/upload-artifact@v4
        with:
          name: DTB
          path: dtb.zip
