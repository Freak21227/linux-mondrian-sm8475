name: Redmi K60 Kernel Builder

on:
  workflow_dispatch:
    inputs:
      build_target:
        description: "What do you want to build?"
        required: true
        default: "all"
        type: choice
        options:
          - kernel
          - modules
          - dts
          - all

env:
  ARCH: arm64
  DEFCONFIG: defconfig
  FRAGMENT_CONFIG: sm8450.config
  DTS_FILE: sm8475-redmi-k60
  LLVM_VERSION: 18          # bump here if your kernel needs 19+

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      # ------------------------------------------------------------------ #
      #  Toolchain — LLVM 18 from apt.llvm.org                              #
      # ------------------------------------------------------------------ #
      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-${{ runner.os }}-llvm${{ env.LLVM_VERSION }}-v1

      - name: Add LLVM ${{ env.LLVM_VERSION }} repository
        run: |
          wget -qO /tmp/llvm.gpg https://apt.llvm.org/llvm-snapshot.gpg.key
          sudo gpg --dearmor < /tmp/llvm.gpg \
            > /usr/share/keyrings/llvm-toolchain.gpg

          echo \
            "deb [signed-by=/usr/share/keyrings/llvm-toolchain.gpg] \
            http://apt.llvm.org/jammy/ \
            llvm-toolchain-jammy-${{ env.LLVM_VERSION }} main" \
            | sudo tee /etc/apt/sources.list.d/llvm.list

      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y \
            bc bison flex build-essential \
            clang-${{ env.LLVM_VERSION }} \
            lld-${{ env.LLVM_VERSION }} \
            llvm-${{ env.LLVM_VERSION }} \
            libssl-dev libelf-dev \
            llvm-${{ env.LLVM_VERSION }}-tools \
            dwarves cpio rsync zip

          # Quick sanity check — version must be 18.x
          clang-${{ env.LLVM_VERSION }} --version

      # ------------------------------------------------------------------ #
      #  Build cache                                                         #
      # ------------------------------------------------------------------ #
      - name: Cache build output
        uses: actions/cache@v4
        with:
          path: out
          key: >-
            kernel-out-${{ runner.os }}-llvm${{ env.LLVM_VERSION }}-
            ${{ hashFiles('Makefile', 'arch/arm64/configs/**', env.FRAGMENT_CONFIG) }}
          restore-keys: |
            kernel-out-${{ runner.os }}-llvm${{ env.LLVM_VERSION }}-

      # ------------------------------------------------------------------ #
      #  Config                                                              #
      # ------------------------------------------------------------------ #
      - name: Prepare config
        run: |
          mkdir -p out

          make O=out \
            ARCH=${{ env.ARCH }} \
            CC=clang-${{ env.LLVM_VERSION }} \
            LLVM=1 \
            LLVM_SUFFIX=-${{ env.LLVM_VERSION }} \
            ${{ env.DEFCONFIG }}

          # Merge optional fragment config
          if [ -f "${{ env.FRAGMENT_CONFIG }}" ]; then
            KCONFIG_CONFIG=out/.config \
              ./scripts/kconfig/merge_config.sh \
                -m \
                out/.config \
                ${{ env.FRAGMENT_CONFIG }}
          fi

          # Resolve any new symbols from the fragment
          make O=out \
            ARCH=${{ env.ARCH }} \
            CC=clang-${{ env.LLVM_VERSION }} \
            LLVM=1 \
            LLVM_SUFFIX=-${{ env.LLVM_VERSION }} \
            olddefconfig

          echo "---"
          echo "Kernel  : $(make O=out kernelversion 2>/dev/null)"
          echo "Clang   : $(clang-${{ env.LLVM_VERSION }} --version | head -1)"
          grep  "^CONFIG_LOCALVERSION=" out/.config || true
          echo "---"

      # ------------------------------------------------------------------ #
      #  Kernel Image                                                        #
      # ------------------------------------------------------------------ #
      - name: Build Image
        if: >
          github.event.inputs.build_target == 'kernel' ||
          github.event.inputs.build_target == 'all'
        run: |
          make -j$(nproc) \
            O=out \
            ARCH=${{ env.ARCH }} \
            CC=clang-${{ env.LLVM_VERSION }} \
            LLVM=1 \
            LLVM_SUFFIX=-${{ env.LLVM_VERSION }} \
            Image

      - name: Collect Image
        if: >
          github.event.inputs.build_target == 'kernel' ||
          github.event.inputs.build_target == 'all'
        run: |
          mkdir -p artifacts/kernel
          cp out/arch/arm64/boot/Image artifacts/kernel/
          zip -r kernel.zip artifacts/kernel/

      - name: Upload Image
        if: >
          github.event.inputs.build_target == 'kernel' ||
          github.event.inputs.build_target == 'all'
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-Image
          path: kernel.zip

      # ------------------------------------------------------------------ #
      #  Modules                                                             #
      # ------------------------------------------------------------------ #
      # ------------------------------------------------------------------ #
      #  Modules                                                             #
      # ------------------------------------------------------------------ #
      - name: Build Modules
        if: >
          github.event.inputs.build_target == 'modules' ||
          github.event.inputs.build_target == 'all'
        run: |
          make -j$(nproc) \
            O=out \
            ARCH=${{ env.ARCH }} \
            CC=clang-${{ env.LLVM_VERSION }} \
            LLVM=1 \
            LLVM_SUFFIX=-${{ env.LLVM_VERSION }} \
            modules

      - name: Install Modules
        if: >
          github.event.inputs.build_target == 'modules' ||
          github.event.inputs.build_target == 'all'
        run: |
          mkdir -p artifacts/modules

          make O=out \
            ARCH=${{ env.ARCH }} \
            INSTALL_MOD_PATH=$PWD/artifacts/modules \
            INSTALL_MOD_STRIP=1 \
            STRIP="llvm-strip-${{ env.LLVM_VERSION }}" \
            modules_install

          # Broken symlinks temizleme
          find artifacts/modules -type l \
            \( -name 'build' -o -name 'source' \) -delete

          echo "Installed modules count:"
          find artifacts/modules/lib/modules -name "*.ko" | wc -l
          
      - name: Collect Modules
        if: >
          github.event.inputs.build_target == 'modules' ||
          github.event.inputs.build_target == 'all'
        run: zip -r modules.zip artifacts/modules/

      - name: Upload Modules
        if: >
          github.event.inputs.build_target == 'modules' ||
          github.event.inputs.build_target == 'all'
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-Modules
          path: modules.zip

      # ------------------------------------------------------------------ #
      #  DTBs                                                                #
      # ------------------------------------------------------------------ #
      - name: Build DTBs
        if: >
          github.event.inputs.build_target == 'dts' ||
          github.event.inputs.build_target == 'all'
        run: |
          make -j$(nproc) \
            O=out \
            ARCH=${{ env.ARCH }} \
            CC=clang-${{ env.LLVM_VERSION }} \
            LLVM=1 \
            LLVM_SUFFIX=-${{ env.LLVM_VERSION }} \
            dtbs

      - name: Collect DTBs
        if: >
          github.event.inputs.build_target == 'dts' ||
          github.event.inputs.build_target == 'all'
        run: |
          mkdir -p artifacts/dtb
          DTB_DIR=out/arch/arm64/boot/dts

          # Target device first
          find "$DTB_DIR" \
            \( -name "${{ env.DTS_FILE }}.dtb" \
            -o  -name "${{ env.DTS_FILE }}.dtbo" \) \
            -exec cp {} artifacts/dtb/ \; 2>/dev/null || true

          # Fallback: everything
          if [ -z "$(ls -A artifacts/dtb)" ]; then
            echo "::warning::Device DTB not found — collecting all DTBs as fallback"
            find "$DTB_DIR" -name "*.dtb"  -exec cp {} artifacts/dtb/ \;
            find "$DTB_DIR" -name "*.dtbo" -exec cp {} artifacts/dtb/ \; || true
          fi

          echo "DTBs collected:"
          ls -lh artifacts/dtb/
          zip -r dtb.zip artifacts/dtb/

      - name: Upload DTBs
        if: >
          github.event.inputs.build_target == 'dts' ||
          github.event.inputs.build_target == 'all'
        uses: actions/upload-artifact@v4
        with:
          name: DTB
          path: dtb.zip
